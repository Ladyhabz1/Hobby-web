services:
  - type: web
    name: swimming-hobby-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    
    # Environment variables
    envVars:
      - key: APP_NAME
        value: "Swimming Hobby API"
      
      - key: APP_ENV
        value: production
      
      - key: APP_DEBUG
        value: "false"
      
      - key: APP_URL
        fromService:
          type: web
          name: swimming-hobby-api
          property: url
      
      - key: FRONTEND_URL
        value: https://swimming-hobby-site.onrender.com
      
      - key: ALLOWED_ORIGINS
        value: https://swimming-hobby-site.onrender.com

# Note: Update FRONTEND_URL and ALLOWED_ORIGINS after frontend deployment.
